name: Terraform Infrastructure

on:
  push:
    branches:
      - main          # apply runs on merge to main
  pull_request:
    branches:
      - main          # plan runs on every pull request

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}

jobs:
  terraform-vpc:
    name: VPC
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: vpc    # runs all commands inside vpc/

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ secrets.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.14.8   # matches your current version

      - name: Terraform Format check
        id: fmt
        run: terraform fmt -check
        continue-on-error: true       # warns but doesn't fail the pipeline

      - name: Terraform Init
        id: init
        run: terraform init

      - name: Terraform Validate
        id: validate
        run: terraform validate       # checks syntax without hitting AWS

      - name: Terraform Plan
        id: plan
        run: terraform plan -no-color -out=tfplan
        continue-on-error: true       # plan can show changes without failing

      - name: Post plan to PR
        uses: actions/github-script@v7
        if: github.event_name == 'pull_request'
        with:
          script: |
            const output = `#### VPC Terraform Plan
            \`\`\`
            ${{ steps.plan.outputs.stdout }}
            \`\`\``;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            })

      - name: Terraform Apply
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: terraform apply -auto-approve -input=false tfplan